<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>色彩検定2級 四択クイズ</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="quiz.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>色彩検定2級 四択クイズ</h1>
        </div>

        <div class="quiz-container">
            <!-- クイズ設定画面 -->
            <div class="quiz-setup" id="quizSetup">
                <div class="form-group">
                    <label for="quizTitle">クイズのタイトル:</label>
                    <input type="text" id="quizTitle" placeholder="例: 色彩検定2級 四択クイズ" value="色彩検定2級 四択クイズ">
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="questionCount">問題数:</label>
                        <input type="number" id="questionCount" min="1" value="5">
                    </div>

                    <div class="form-group">
                        <label for="quizMode">出題モード:</label>
                        <select id="quizMode" onchange="handleModeChange()">
                            <option value="all">全問題から出題</option>
                            <option value="wrong">間違えた問題だけ</option>
                            <option value="favorites">お気に入りの間違い問題</option>
                            <option value="weak">苦手分野から出題</option>
                            <option value="category">分野を選んで出題</option>
                        </select>
                    </div>
                </div>

                <div class="form-group mode-category" id="categoryField">
                    <label for="categorySelect">分野:</label>
                    <select id="categorySelect" onchange="handleModeChange()"></select>
                </div>

                <div class="study-dashboard">
                    <div class="study-card">
                        <span class="study-label">間違えた問題</span>
                        <strong id="wrongCount">0</strong>
                    </div>
                    <div class="study-card">
                        <span class="study-label">お気に入り</span>
                        <strong id="favoriteCount">0</strong>
                    </div>
                    <div class="study-card">
                        <span class="study-label">最高得点</span>
                        <strong id="bestScore">未挑戦</strong>
                    </div>
                </div>

                <div class="review-panel">
                    <div class="panel-heading">
                        <h2>間違えた問題欄</h2>
                        <button class="btn secondary" type="button" onclick="startWrongQuiz()">まとめて復習</button>
                    </div>
                    <div class="review-list" id="wrongQuestionList"></div>
                </div>

                <div class="review-panel">
                    <div class="panel-heading">
                        <h2>苦手分野</h2>
                    </div>
                    <div class="weak-category-list" id="weakCategoryList"></div>
                </div>

                <div class="form-row">
                    
                    <div class="form-group">
                        <button class="btn" onclick="generateQuiz()">クイズをはじめる</button>
                    </div>
                </div>
            </div>

            <!-- クイズ実行画面 -->
            <div class="quiz-playing" id="quizPlaying">
                <div class="quiz-progress" id="quizProgress"></div>
                <h2 id="quizTitleDisplay"></h2>
                
                <div class="question" id="currentQuestion"></div>
                
                <ul class="selections" id="selections"></ul>
                
                <div class="answer-feedback" id="answerFeedback"></div>
                
                <button class="btn" id="nextBtn" onclick="nextQuestion()" style="display: none;">次の問題</button>
                <button class="btn" id="finishBtn" onclick="showResults()" style="display: none;">結果を見る</button>
            </div>

            <!-- 結果画面 -->
            <div class="quiz-results" id="quizResults">
                <h2>クイズ結果</h2>
                <div class="score" id="finalScore"></div>
                <div class="result-detail" id="resultDetail"></div>
                <div class="review-list result-wrong-list" id="resultWrongList"></div>
                <div class="ranking-panel">
                    <h3>ランキング</h3>
                    <ol class="ranking-list" id="rankingList"></ol>
                </div>
                <button class="btn" onclick="restartQuiz()">もう一度挑戦する</button>
            </div>
        </div>

        <div class="status" id="status">Ready</div>
        <div class="loading" id="loading">クイズを生成中...</div>
    </div>

                answer: 0,
                explanation: '読みやすさには、文字と背景の明度差や十分なサイズが重要です。色だけに頼る表示は避けます。'

            {
                question: '同じ色でも、光沢のある面とつや消しの面で見え方が変わる理由として最も近いものはどれ？',
                selections: ['材質や表面状態が反射の仕方に影響するため', '色相が物理的に消えるため', '無彩色だけになるため', '補色関係がなくなるため'],
                answer: 0,
                explanation: '表面の質感や光沢は光の反射に影響し、同じ色でも明るさや鮮やかさの印象を変えます。'
            },
            {
                question: '「用途から選ぶ」問題です。病院の待合室に穏やかで清潔な印象を出したい場合、比較的向いている配色はどれ？',
                selections: ['高彩度の赤と黒の強い対比', '低彩度で明るめの青緑や白を中心にした配色', '暗い紫と暗い茶だけの配色', '蛍光色を全面に使う配色'],
                answer: 1,
                explanation: '明るく低彩度の寒色系や白は、清潔感や落ち着きの印象を作りやすい配色です。'

                answer: 0,
                explanation: 'グラデーションは、色の属性を連続的・段階的に変化させてつながりを作る配色です。'

                answer: 0,
                explanation: '色には心理的・象徴的な印象があり、赤は活気、熱、食欲などのイメージと結びつけられやすい色です。'

        const questionCategories = [
            '表色系', 'トーン', '色の見え方', '色の見え方', '配色', '配色',
            'ユニバーサルデザイン', '色の見え方', '混色', '混色', '色の三属性',
            '配色', '配色', 'トーン', '色の心理効果', '配色', '混色',
            '色の見え方', '色の見え方', 'インテリア', 'ファッション', '色名',
            '光と色', '混色', 'ユニバーサルデザイン', '素材と質感', '色の心理効果',
            '配色', 'トーン', '色の心理効果'
        ];

        questionBank.forEach((question, index) => {
            question.id = `q${index + 1}`;
            question.category = questionCategories[index] || 'その他';
        });

        const STORAGE_KEYS = {
            wrong: 'colorQuizWrongQuestions',
            scores: 'colorQuizScoreHistory'
        };

        // 初期化
        document.addEventListener('DOMContentLoaded', function() {
            const countInput = document.getElementById('questionCount');
            countInput.max = questionBank.length;
            countInput.title = `1〜${questionBank.length}問まで選べます`;
            populateCategorySelect();
            handleModeChange();
            renderStudyDashboard();
            updateStatus();
        });

        // ステータス更新
        function updateStatus() {
            const statusEl = document.getElementById('status');
            statusEl.textContent = '色彩検定2級の問題を準備できています';
            statusEl.style.color = '#9f3a4d';
        }

        function loadStore(key, fallback) {
            try {
                return JSON.parse(localStorage.getItem(key)) || fallback;
            } catch (error) {
                return fallback;
            }
        }

        function saveStore(key, value) {
            localStorage.setItem(key, JSON.stringify(value));
        }

        function getWrongStore() {
            return loadStore(STORAGE_KEYS.wrong, {});
        }

        function getScoreHistory() {
            return loadStore(STORAGE_KEYS.scores, []);
        }

        function getQuestionById(id) {
            return questionBank.find(question => question.id === id);
        }

        function getCategories() {
            return [...new Set(questionBank.map(question => question.category))];
        }

        function populateCategorySelect() {
            const categorySelect = document.getElementById('categorySelect');
            categorySelect.innerHTML = '';
            getCategories().forEach(category => {
                const option = document.createElement('option');
                option.value = category;
                option.textContent = category;
                categorySelect.appendChild(option);
            });
        }

        function getWrongQuestions() {
            return Object.values(getWrongStore())
                .map(saved => ({...getQuestionById(saved.id), ...saved}))
                .filter(question => question.id);
        }

        function getFavoriteWrongQuestions() {
            return getWrongQuestions().filter(question => question.favorite);
        }

        function getWeakCategories() {
            const totals = {};
            getWrongQuestions().forEach(question => {
                totals[question.category] = (totals[question.category] || 0) + question.wrongCount;
            });

            return Object.entries(totals)
                .sort((a, b) => b[1] - a[1])
                .map(([category, count]) => ({category, count}));
        }

        function handleModeChange() {
            const mode = document.getElementById('quizMode').value;
            const categoryField = document.getElementById('categoryField');
            const countInput = document.getElementById('questionCount');
            syncCategorySelection(mode);
            const source = getQuizSource(mode);

            categoryField.style.display = mode === 'weak' || mode === 'category' ? 'block' : 'none';
            countInput.max = Math.max(source.length, 1);
            countInput.title = source.length ? `1〜${source.length}問まで選べます` : '出題できる問題がありません';
            if (source.length && Number(countInput.value) > source.length) {
                countInput.value = source.length;
            }
        }

        function syncCategorySelection(mode) {
            if (mode !== 'weak') return;

            const categorySelect = document.getElementById('categorySelect');
            const weakCategories = getWeakCategories().map(item => item.category);
            if (weakCategories.length && !weakCategories.includes(categorySelect.value)) {
                categorySelect.value = weakCategories[0];
            }
        }

        function getQuizSource(mode = document.getElementById('quizMode').value) {
            const category = document.getElementById('categorySelect').value;
            if (mode === 'wrong') return getWrongQuestions();
            if (mode === 'favorites') return getFavoriteWrongQuestions();
            if (mode === 'weak') {
                const weakCategories = getWeakCategories();
                if (!weakCategories.length) return [];

                const weakCategoryNames = weakCategories.map(item => item.category);
                const selectedCategory = weakCategoryNames.includes(category) ? category : weakCategories[0].category;
                return questionBank.filter(question => question.category === selectedCategory);
            }
            if (mode === 'category') {
                return questionBank.filter(question => question.category === category);
            }
            return questionBank;
        }

        function getModeLabel(mode = document.getElementById('quizMode').value) {
            const labels = {
                all: '全問題',
                wrong: '間違えた問題',
                favorites: 'お気に入り',
                weak: `苦手分野: ${document.getElementById('categorySelect').value}`,
                category: `分野: ${document.getElementById('categorySelect').value}`
            };
            return labels[mode] || '全問題';
        }

        function renderStudyDashboard() {
            const wrongQuestions = getWrongQuestions();
            const favorites = wrongQuestions.filter(question => question.favorite);
            const scores = getScoreHistory();
            const best = [...scores].sort((a, b) => b.percentage - a.percentage || b.score - a.score)[0];

            document.getElementById('wrongCount').textContent = wrongQuestions.length;
            document.getElementById('favoriteCount').textContent = favorites.length;
            document.getElementById('bestScore').textContent = best ? `${best.score}/${best.total} (${best.percentage}%)` : '未挑戦';
            renderWrongQuestionList();
            renderWeakCategoryList();
            renderRanking();
        }

        function renderWrongQuestionList() {
            const list = document.getElementById('wrongQuestionList');
            const wrongQuestions = getWrongQuestions().sort((a, b) => b.wrongCount - a.wrongCount);
            if (!wrongQuestions.length) {
                list.innerHTML = '<p class="empty-text">まだ間違えた問題はありません。</p>';
                return;
            }

            list.innerHTML = '';
            wrongQuestions.forEach(question => {
                list.appendChild(createQuestionCard(question));
            });
        }

        function createQuestionCard(question) {
            const card = document.createElement('div');
            card.className = 'review-item';
            const favoriteLabel = question.favorite ? 'お気に入り解除' : 'お気に入り';
            card.innerHTML = `
                <div class="review-meta">
                    <span>${question.category}</span>
                    <span>${question.wrongCount}回ミス</span>
                </div>
                <p>${question.question}</p>
                <div class="review-answer">正解: ${question.selections[question.answer]}</div>
                <div class="review-actions">
                    <button class="mini-btn" type="button" onclick="toggleFavorite('${question.id}')">${favoriteLabel}</button>
                </div>
            `;
            return card;
        }

        function renderWeakCategoryList() {
            const list = document.getElementById('weakCategoryList');
            const weakCategories = getWeakCategories();
            if (!weakCategories.length) {
                list.innerHTML = '<p class="empty-text">回答すると苦手分野が表示されます。</p>';
                return;
            }

            list.innerHTML = '';
            weakCategories.forEach(({category, count}) => {
                const button = document.createElement('button');
                button.type = 'button';
                button.className = 'category-chip';
                button.textContent = `${category} ${count}回`;
                button.onclick = () => startCategoryQuiz(category, true);
                list.appendChild(button);
            });
        }

        // クイズ生成
        function generateQuiz() {
            const title = document.getElementById('quizTitle').value.trim();
            const count = parseInt(document.getElementById('questionCount').value);
            const mode = document.getElementById('quizMode').value;
            const source = getQuizSource(mode);

            if (!source.length) {
                alert('このモードで出題できる問題がまだありません');
                return;
            }

            if (!title || count < 1 || count > source.length) {
                alert(`問題数は1〜${source.length}の範囲で入力してください`);
                return;
            }

            quizData = shuffle(source).slice(0, count);
            currentQuestionIndex = 0;
            score = 0;
            resultSaved = false;
            wrongQuestionsThisRound = [];
            currentQuizModeLabel = getModeLabel(mode);
            document.getElementById('quizTitleDisplay').textContent = title;
            startQuiz();
        }

        function startWrongQuiz() {
            document.getElementById('quizMode').value = 'wrong';
            handleModeChange();
            generateQuiz();
        }

        function startCategoryQuiz(category, weakMode) {
            document.getElementById('quizMode').value = weakMode ? 'weak' : 'category';
            document.getElementById('categorySelect').value = category;
            handleModeChange();
            generateQuiz();
        }

        // クイズ開始
        function startQuiz() {
            document.getElementById('quizSetup').style.display = 'none';
            document.getElementById('quizPlaying').style.display = 'block';
            document.getElementById('quizResults').style.display = 'none';
            showQuestion();
        }

        // 問題表示
        function showQuestion() {
            if (currentQuestionIndex >= quizData.length) {
                showResults();
                return;
            }

            const question = quizData[currentQuestionIndex];
            hasAnswered = false;
            selectedAnswer = null;

            document.getElementById('quizProgress').textContent = 
                `問題 ${currentQuestionIndex + 1} / ${quizData.length}`;
            
            document.getElementById('currentQuestion').textContent = question.question;
            
            const selectionsEl = document.getElementById('selections');
            selectionsEl.innerHTML = '';
            
            question.selections.forEach((selection, index) => {
                const li = document.createElement('li');
                li.className = 'selection-item';
                li.textContent = selection;
                li.onclick = () => selectAnswer(index);
                selectionsEl.appendChild(li);
            });

            document.getElementById('answerFeedback').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'none';
            document.getElementById('finishBtn').style.display = 'none';
        }

        // 答え選択
        function selectAnswer(index) {
            if (hasAnswered) return;

            selectedAnswer = index;
            hasAnswered = true;

            const question = quizData[currentQuestionIndex];
            const correctAnswer = question.answer;
            const isCorrect = selectedAnswer === correctAnswer;

            if (isCorrect) {
                score++;
            }

            const selectionItems = document.querySelectorAll('.selection-item');
            selectionItems.forEach((item, i) => {
                item.onclick = null;
                if (i === correctAnswer) {
                    item.classList.add('correct');
                } else if (i === selectedAnswer && !isCorrect) {
                    item.classList.add('incorrect');
                }
            });

            const feedback = document.getElementById('answerFeedback');
            feedback.style.display = 'block';
            if (isCorrect) {
                feedback.className = 'answer-feedback correct';
                feedback.textContent = `正解！ ${question.explanation}`;
            } else {
                feedback.className = 'answer-feedback incorrect';
                recordWrongQuestion(question);
                const favoriteLabel = (getWrongStore()[question.id] || {}).favorite ? 'お気に入り解除' : 'お気に入り登録';
                feedback.innerHTML = `
                    不正解。正解は「${question.selections[correctAnswer]}」です。${question.explanation}
                    <div class="feedback-actions">
                        <button class="mini-btn" type="button" onclick="toggleFavorite('${question.id}')">${favoriteLabel}</button>
                    </div>
                `;
            }

            if (currentQuestionIndex < quizData.length - 1) {
                document.getElementById('nextBtn').style.display = 'inline-block';
            } else {
                document.getElementById('finishBtn').style.display = 'inline-block';
            }
        }

        // 次の問題
        function nextQuestion() {
            currentQuestionIndex++;
            showQuestion();
        }

        // 結果表示
        function showResults() {
            document.getElementById('quizPlaying').style.display = 'none';
            document.getElementById('quizResults').style.display = 'block';
            
            const percentage = Math.round((score / quizData.length) * 100);
            document.getElementById('finalScore').textContent = 
                `${score} / ${quizData.length} 問正解 (${percentage}%)`;
            document.getElementById('resultDetail').textContent = `${currentQuizModeLabel}で挑戦しました`;
            saveScoreResult(percentage);
            renderResultWrongList();
            renderStudyDashboard();
        }

        // クイズリスタート
        function restartQuiz() {
            document.getElementById('quizResults').style.display = 'none';
            document.getElementById('quizSetup').style.display = 'block';
            quizData = [];
            currentQuestionIndex = 0;
            score = 0;
            wrongQuestionsThisRound = [];
            resultSaved = false;
            handleModeChange();
            renderStudyDashboard();
        }

        function recordWrongQuestion(question) {
            const wrongStore = getWrongStore();
            const saved = wrongStore[question.id] || {
                id: question.id,
                question: question.question,
                selections: question.selections,
                answer: question.answer,
                explanation: question.explanation,
                category: question.category,
                wrongCount: 0,
                favorite: false
            };

            saved.wrongCount += 1;
            saved.lastWrongAt = new Date().toISOString();
            wrongStore[question.id] = saved;
            saveStore(STORAGE_KEYS.wrong, wrongStore);

            if (!wrongQuestionsThisRound.some(item => item.id === question.id)) {
                wrongQuestionsThisRound.push(saved);
            }
        }

        function toggleFavorite(questionId) {
            const wrongStore = getWrongStore();
            const question = getQuestionById(questionId);
            if (!question) return;

            const saved = wrongStore[questionId] || {
                id: question.id,
                question: question.question,
                selections: question.selections,
                answer: question.answer,
                explanation: question.explanation,
                category: question.category,
                wrongCount: 0,
                favorite: false
            };
            saved.favorite = !saved.favorite;
            wrongStore[questionId] = saved;
            saveStore(STORAGE_KEYS.wrong, wrongStore);
            renderStudyDashboard();
            renderResultWrongList();
        }

        function saveScoreResult(percentage) {
            if (resultSaved || !quizData.length) return;
            const history = getScoreHistory();
            history.push({
                id: Date.now().toString(),
                date: new Date().toISOString(),
                title: document.getElementById('quizTitle').value.trim() || 'クイズ',
                mode: currentQuizModeLabel,
                score,
                total: quizData.length,
                percentage
            });
            saveStore(STORAGE_KEYS.scores, history.slice(-50));
            resultSaved = true;
        }

        function renderResultWrongList() {
            const list = document.getElementById('resultWrongList');
            if (!list) return;
            if (!wrongQuestionsThisRound.length) {
                list.innerHTML = '<p class="empty-text">今回間違えた問題はありません。</p>';
                return;
            }

            list.innerHTML = '<h3>今回間違えた問題</h3>';
            wrongQuestionsThisRound.forEach(question => {
                const latest = getWrongStore()[question.id] || question;
                list.appendChild(createQuestionCard({...question, ...latest}));
            });
        }

        function renderRanking() {
            const list = document.getElementById('rankingList');
            if (!list) return;
            const ranking = getScoreHistory()
                .sort((a, b) => b.percentage - a.percentage || b.score - a.score || new Date(b.date) - new Date(a.date))
                .slice(0, 10);

            if (!ranking.length) {
                list.innerHTML = '<li class="empty-text">まだランキングはありません。</li>';
                return;
            }

            list.innerHTML = '';
            ranking.forEach(result => {
                const li = document.createElement('li');
                const date = new Date(result.date).toLocaleDateString('ja-JP');
                li.innerHTML = `
                    <strong>${result.score}/${result.total} (${result.percentage}%)</strong>
                    <span>${result.mode}・${date}</span>
                `;
                list.appendChild(li);
            });
        }

        function shuffle(items) {
            const copied = [...items];
            for (let i = copied.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [copied[i], copied[j]] = [copied[j], copied[i]];
            }
            return copied;
        }
    </script>
</body>
</html>
